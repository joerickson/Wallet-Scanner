<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Wallet Scanner</title>
  <style>
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #21262d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --blue:    #58a6ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 32px;
      width: 320px;
      text-align: center;
    }

    h1 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }

    .sub {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 28px;
    }

    .error {
      color: #f85149;
      font-size: 12px;
      margin-bottom: 16px;
      min-height: 18px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 10px 16px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 10px;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn:hover {
      background: #1c2128;
      border-color: #30363d;
    }

    .btn:last-child { margin-bottom: 0; }
    .btn:disabled { opacity: 0.6; cursor: default; }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 16px 0;
      color: var(--muted);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .input {
      width: 100%;
      padding: 9px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      margin-bottom: 8px;
      outline: none;
      transition: border-color 0.15s;
    }
    .input:focus { border-color: var(--blue); }
    .input::placeholder { color: var(--muted); }

    .btn-primary {
      background: var(--blue);
      color: #0d1117;
      border-color: var(--blue);
      font-weight: 600;
    }
    .btn-primary:hover { background: #79b8ff; border-color: #79b8ff; }

    .toggle-link {
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
    }
    .toggle-link a { color: var(--blue); text-decoration: none; }
    .toggle-link a:hover { text-decoration: underline; }

    .footer {
      margin-top: 24px;
      font-size: 11px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Wallet Scanner</h1>
    <p class="sub">Sign in to view the leaderboard</p>
    <div class="error" id="error-msg"></div>

    <button type="button" class="btn" id="google-btn" onclick="signInWithGoogle(event)">
      <!-- Google "G" logo -->
      <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>

    <div class="divider">or</div>

    <form id="email-form">
      <input type="hidden" name="action" id="form-action" value="signin" />
      <div id="name-field" style="display:none">
        <input type="text" name="name" id="name-input" placeholder="Your name" class="input" autocomplete="name" />
      </div>
      <input type="email" name="email" id="email-input" placeholder="Email" required class="input" autocomplete="email" />
      <input type="password" name="password" id="password-input" placeholder="Password" required class="input" autocomplete="current-password" />
      <button type="submit" class="btn btn-primary" id="submit-btn">Sign in with Email</button>
    </form>
    <p class="toggle-link">
      <span id="toggle-text">Don't have an account?</span>
      <a href="#" id="toggle-link" onclick="toggleMode(); return false;">Sign Up</a>
    </p>

    <p class="footer">predictionscanner.io</p>
  </div>

  <script>
    // Neon Auth base URL — loaded from /api/config on init
    let _neonAuthUrl = '';

    function setError(msg) {
      document.getElementById('error-msg').textContent = msg || '';
    }

    function parseJwt(token) {
      try {
        const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
        return JSON.parse(window.atob(base64));
      } catch(e) { return null; }
    }

    // Called when returning from Google OAuth flow
    async function handleOAuthCallback() {
      // Try to get the session token from Neon Auth cross-origin.
      // This works if Neon Auth has CORS + SameSite=None cookies configured.
      try {
        const res = await fetch(_neonAuthUrl + '/get-session', { credentials: 'include' });
        if (res.ok) {
          const data = await res.json();
          const token = (data.session && data.session.token) || data.token;
          if (token) {
            localStorage.setItem('auth_token', token);
            window.location.replace('/');
            return;
          }
        }
      } catch(e) {}
      setError('OAuth sign-in failed. Please try again.');
      history.replaceState({}, '', '/login');
    }

    // Initiate Google OAuth — calls Neon Auth directly, redirects to Google
    async function signInWithGoogle(e) {
      e.preventDefault();
      setError('');
      const btn = document.getElementById('google-btn');
      btn.disabled = true;
      try {
        const res = await fetch(_neonAuthUrl + '/sign-in/social', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            provider: 'google',
            callbackURL: window.location.origin + '/login?oauth_callback=1'
          })
        });
        const data = await res.json().catch(() => ({}));
        const redirectUrl = data.url || data.redirect;
        if (redirectUrl) {
          window.location.href = redirectUrl;
        } else {
          setError('Failed to initiate Google sign-in');
          btn.disabled = false;
        }
      } catch(err) {
        setError('Network error. Please try again.');
        btn.disabled = false;
      }
    }

    // Handle email sign-in or sign-up — calls Neon Auth directly
    async function handleEmailSubmit(e) {
      e.preventDefault();
      setError('');
      const action = document.getElementById('form-action').value;
      const email = document.getElementById('email-input').value.trim();
      const password = document.getElementById('password-input').value;
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;

      try {
        let url, body;
        if (action === 'signup') {
          const name = (document.getElementById('name-input').value || '').trim()
            || email.split('@')[0];
          url = _neonAuthUrl + '/sign-up/email';
          body = { email, password, name };
        } else {
          url = _neonAuthUrl + '/sign-in/email';
          body = { email, password, rememberMe: true };
        }

        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(body)
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          setError(data.message || 'Authentication failed');
          return;
        }

        const token = data.token;
        if (!token) {
          setError('No token returned from authentication service');
          return;
        }
        localStorage.setItem('auth_token', token);
        window.location.replace('/');
      } catch(err) {
        setError('Network error. Please try again.');
      } finally {
        btn.disabled = false;
      }
    }

    function toggleMode() {
      const isSignIn = document.getElementById('form-action').value === 'signin';
      if (isSignIn) {
        document.getElementById('form-action').value = 'signup';
        document.getElementById('name-field').style.display = '';
        document.getElementById('name-input').required = true;
        document.getElementById('submit-btn').textContent = 'Sign up with Email';
        document.getElementById('toggle-text').textContent = 'Already have an account?';
        document.getElementById('toggle-link').textContent = 'Sign In';
        document.getElementById('password-input').autocomplete = 'new-password';
      } else {
        document.getElementById('form-action').value = 'signin';
        document.getElementById('name-field').style.display = 'none';
        document.getElementById('name-input').required = false;
        document.getElementById('submit-btn').textContent = 'Sign in with Email';
        document.getElementById('toggle-text').textContent = "Don't have an account?";
        document.getElementById('toggle-link').textContent = 'Sign Up';
        document.getElementById('password-input').autocomplete = 'current-password';
      }
    }

    async function init() {
      // Load Neon Auth URL from backend
      try {
        const res = await fetch('/api/config');
        const data = await res.json();
        _neonAuthUrl = (data.neon_auth_url || '').replace(/\/$/, '');
      } catch(e) {}

      if (!_neonAuthUrl) {
        // Auth not configured (local dev) — go straight to dashboard
        window.location.replace('/');
        return;
      }

      // Handle OAuth callback
      const params = new URLSearchParams(location.search);
      if (params.get('oauth_callback')) {
        await handleOAuthCallback();
        return;
      }

      // Redirect to dashboard if already signed in with a non-expired token
      const token = localStorage.getItem('auth_token');
      if (token) {
        const payload = parseJwt(token);
        if (payload && payload.exp && payload.exp * 1000 > Date.now()) {
          window.location.replace('/');
          return;
        }
        localStorage.removeItem('auth_token');
      }

      document.getElementById('email-form').addEventListener('submit', handleEmailSubmit);
    }

    init();
  </script>
</body>
</html>
