<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wallet Scanner</title>
  <style>
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --surface2: #1c2128;
      --border:  #21262d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --green:   #3fb950;
      --red:     #f85149;
      --yellow:  #d29922;
      --blue:    #58a6ff;
      --hover:   #1c2128;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    #app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    /* ── Header ───────────────────────────────────────────────── */

    header { margin-bottom: 20px; }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .header-user {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .header-user a {
      color: var(--blue);
      text-decoration: none;
    }
    .header-user a:hover { text-decoration: underline; }

    .header-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .header-meta span + span::before {
      content: ' · ';
      margin: 0 4px;
    }

    /* ── Watchlist summary bar ────────────────────────────────── */

    #watchlist-summary {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
    }

    #watchlist-summary a {
      color: var(--blue);
      text-decoration: none;
      cursor: pointer;
    }
    #watchlist-summary a:hover { text-decoration: underline; }

    /* ── View filter tabs ─────────────────────────────────────── */

    .filter-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
    }

    .tab-btn {
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
      white-space: nowrap;
    }
    .tab-btn:hover { color: var(--text); border-color: #444c56; }
    .tab-btn.active {
      background: var(--blue);
      color: #0d1117;
      border-color: var(--blue);
    }

    @media (max-width: 480px) {
      .filter-tabs { overflow-x: auto; padding-bottom: 2px; flex-wrap: nowrap; }
    }

    /* ── Star / watch button ──────────────────────────────────── */

    .star-btn {
      font-size: 15px;
      line-height: 1;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 2px 3px;
      border-radius: 4px;
      transition: color 0.1s, background 0.1s;
      vertical-align: middle;
    }
    .star-btn:hover { color: var(--yellow); background: rgba(210,153,34,0.1); }
    .star-btn.watching { color: var(--yellow); }

    /* ── Activity dot ─────────────────────────────────────────── */

    .activity-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--blue);
      vertical-align: middle;
      margin-left: 3px;
      cursor: default;
      flex-shrink: 0;
    }

    .watch-cell {
      display: flex;
      align-items: center;
      gap: 0;
      white-space: nowrap;
    }

    /* ── Table wrapper ────────────────────────────────────────── */

    .table-wrap {
      overflow-x: auto;
      border-radius: 8px;
      border: 1px solid var(--border);
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
    }

    /* ── Thead ────────────────────────────────────────────────── */

    thead th {
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      user-select: none;
      background: var(--surface);
    }

    thead th.sort { cursor: pointer; }
    thead th.sort:hover { color: var(--text); }
    thead th.asc::after  { content: ' ↑'; color: var(--blue); }
    thead th.desc::after { content: ' ↓'; color: var(--blue); }

    th.col-watch { width: 36px; padding: 10px 6px; }

    /* ── Tbody ────────────────────────────────────────────────── */

    tbody tr.row {
      cursor: pointer;
      transition: background 0.1s;
    }

    tbody tr.row:hover,
    tbody tr.row.open { background: var(--hover); }

    tbody tr.detail-row:hover { background: transparent; }

    td {
      padding: 10px 12px;
      vertical-align: middle;
      border-bottom: 1px solid var(--border);
    }

    td.col-watch { padding: 10px 6px; }

    tbody tr:last-child td { border-bottom: none; }

    /* ── Rank ─────────────────────────────────────────────────── */

    .rank {
      font-size: 13px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .rank.bold { color: var(--text); font-weight: 700; }

    /* ── Deep indicator (top-10 rows) ────────────────────────── */

    .deep-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      margin-left: 5px;
      border-radius: 50%;
      background: rgba(88,166,255,0.15);
      border: 1px solid rgba(88,166,255,0.35);
      cursor: default;
      vertical-align: middle;
      flex-shrink: 0;
    }

    .deep-icon svg {
      display: block;
    }

    /* ── Wallet ───────────────────────────────────────────────── */

    .addr-btn {
      font-family: 'SFMono-Regular', Consolas, Menlo, monospace;
      font-size: 12px;
      background: none;
      border: none;
      color: var(--blue);
      cursor: pointer;
      padding: 0;
      white-space: nowrap;
    }
    .addr-btn:hover { text-decoration: underline; }

    /* ── P&L ──────────────────────────────────────────────────── */

    .pos { color: var(--green); font-variant-numeric: tabular-nums; }
    .neg { color: var(--red);   font-variant-numeric: tabular-nums; }
    .neu { color: var(--muted); }

    /* ── Volume ───────────────────────────────────────────────── */

    .vol { color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; }

    /* ── Score badge ──────────────────────────────────────────── */

    .badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .bg  { background: rgba(63,185,80,0.12);   color: var(--green); }
    .bb  { background: rgba(88,166,255,0.12);  color: var(--blue);  }
    .bk  { background: rgba(139,148,158,0.12); color: var(--muted); }

    /* ── Skill bar ────────────────────────────────────────────── */

    .skill-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 72px;
    }
    .skill-track {
      width: 44px;
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .skill-fill { height: 100%; background: var(--green); border-radius: 3px; }
    .skill-num  { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }

    /* ── Edge ─────────────────────────────────────────────────── */

    .edge {
      color: var(--muted);
      font-size: 12px;
      max-width: 220px;
      min-width: 80px;
    }

    /* ── Flag pills ───────────────────────────────────────────── */

    .flags { display: flex; flex-wrap: wrap; gap: 3px; min-width: 60px; }

    .pill {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 500;
      white-space: nowrap;
    }
    .pr { background: rgba(248,81,73,0.12);   color: var(--red);    }
    .py { background: rgba(210,153,34,0.12);  color: var(--yellow); }
    .pk { background: rgba(139,148,158,0.12); color: var(--muted);  }

    /* ── Detail row ───────────────────────────────────────────── */

    .detail-cell {
      padding: 0;
      background: var(--surface2);
      border-top: 1px solid var(--border);
    }

    .detail-inner { padding: 16px; }

    .detail-metrics {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px 16px;
      margin-bottom: 12px;
    }

    .dm-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
    }
    .dm-value {
      font-size: 14px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .detail-sec { margin-top: 12px; }

    .detail-sec-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .detail-sec-body {
      font-size: 13px;
      color: var(--text);
      line-height: 1.65;
    }

    .detail-flags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }

    .detail-actions {
      display: flex;
      gap: 14px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
      align-items: center;
    }

    .action-link {
      font-size: 12px;
      color: var(--blue);
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }
    .action-link:hover { text-decoration: underline; }

    /* ── States ───────────────────────────────────────────────── */

    .state-msg {
      text-align: center;
      padding: 64px 24px;
      color: var(--muted);
      font-size: 14px;
    }

    /* ── Toast ────────────────────────────────────────────────── */

    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 12px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.18s, transform 0.18s;
      pointer-events: none;
      z-index: 1000;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    /* ── Deep Analysis Section ────────────────────────────────── */

    .da-section {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .da-header {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .da-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin: 0;
    }

    .da-timestamp {
      font-size: 11px;
      color: var(--muted);
    }

    .da-regen-btn {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: none;
      color: var(--blue);
      cursor: pointer;
      margin-left: auto;
      transition: background 0.1s, border-color 0.1s;
    }
    .da-regen-btn:hover:not(:disabled) { background: rgba(88,166,255,0.08); border-color: var(--blue); }
    .da-regen-btn:disabled { opacity: 0.5; cursor: default; }

    .da-inline-msg {
      font-size: 11px;
      color: var(--muted);
      margin-left: auto;
      font-style: italic;
    }

    .da-rate-limit {
      font-size: 11px;
      color: var(--yellow);
      margin-left: auto;
    }

    .da-error-msg {
      font-size: 12px;
      color: var(--red);
      padding: 6px 0;
    }

    /* At-a-glance cards */
    .da-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .da-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
    }

    .da-card-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .da-card-value {
      font-size: 18px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1.2;
    }

    .da-replicable-yes { color: var(--green); }
    .da-replicable-no  { color: var(--red);   }

    .da-conf {
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
      margin-left: 3px;
    }

    .da-strategy-badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      background: rgba(88,166,255,0.12);
      color: var(--blue);
    }

    /* Blueprint */
    .da-subsection {
      margin-bottom: 14px;
    }

    .da-subsection-title {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 7px;
      font-weight: 600;
    }

    .da-blueprint {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 5px 12px;
    }

    .da-blueprint dt {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      padding-top: 1px;
    }

    .da-blueprint dd {
      font-size: 12px;
      color: var(--text);
      line-height: 1.55;
      margin: 0;
    }

    /* Performance estimates */
    .da-perf {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .da-perf-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .da-perf-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .da-perf-value {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    /* Risks — collapsible */
    .da-risks {
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 14px;
    }

    .da-risks summary {
      cursor: pointer;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .da-risks summary::-webkit-details-marker { display: none; }

    .da-risks summary::before {
      content: '▶';
      font-size: 8px;
      transition: transform 0.15s;
      display: inline-block;
    }
    .da-risks[open] summary::before { transform: rotate(90deg); }

    .da-risks-body {
      padding: 0 12px 10px;
      border-top: 1px solid var(--border);
    }

    .da-risks h3 {
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      margin: 10px 0 5px;
    }

    .da-risks ul {
      margin: 0;
      padding-left: 18px;
    }

    .da-risks li {
      font-size: 12px;
      color: var(--text);
      line-height: 1.55;
      margin-bottom: 3px;
    }

    /* Full thesis */
    .da-thesis {
      font-size: 13px;
      color: var(--text);
      line-height: 1.7;
    }

    .da-thesis p + p { margin-top: 8px; }

    /* Paper trade recommendation callout */
    .da-callout {
      margin-top: 10px;
      padding: 10px 12px;
      background: rgba(63,185,80,0.07);
      border: 1px solid rgba(63,185,80,0.25);
      border-radius: 6px;
    }

    .da-callout-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 5px;
    }

    .da-callout-body {
      font-size: 12px;
      color: var(--text);
      line-height: 1.6;
    }

    /* Skeleton */
    .da-skeleton {
      animation: da-pulse 1.4s ease-in-out infinite;
    }

    @keyframes da-pulse {
      0%, 100% { opacity: 0.55; }
      50%       { opacity: 0.25; }
    }

    .da-skel-block {
      background: var(--border);
      border-radius: 4px;
    }

    /* Empty state */
    .da-empty {
      font-size: 12px;
      color: var(--muted);
      padding: 4px 0 8px;
    }

    .da-generate-btn {
      font-size: 11px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: none;
      color: var(--green);
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
    }
    .da-generate-btn:hover:not(:disabled) {
      background: rgba(63,185,80,0.08);
      border-color: var(--green);
    }
    .da-generate-btn:disabled { opacity: 0.5; cursor: default; }

    /* Placeholder for rank 11+ */
    .da-placeholder-msg {
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
    }

    /* History */
    .da-history-link {
      font-size: 11px;
      color: var(--blue);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      margin-top: 10px;
      display: inline-block;
    }
    .da-history-link:hover { text-decoration: underline; }

    .da-history-list {
      margin-top: 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .da-history-item {
      padding: 8px 12px;
      font-size: 11px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .da-history-item:last-child { border-bottom: none; }
    .da-history-item strong { color: var(--text); }

    /* ── Strategies Tab ───────────────────────────────────────── */

    .strat-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 20px;
      margin-bottom: 14px;
      align-items: flex-start;
    }

    .strat-filter-group {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
    }

    .strat-filter-label {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      font-weight: 500;
    }

    .strat-pill {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
      white-space: nowrap;
    }
    .strat-pill:hover { color: var(--text); border-color: #444c56; }
    .strat-pill.active {
      background: var(--blue);
      color: #0d1117;
      border-color: var(--blue);
    }

    .strategies-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .strategy-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .sc-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .sc-rank {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      min-width: 28px;
      font-variant-numeric: tabular-nums;
    }

    .sc-addr {
      font-family: 'SFMono-Regular', Consolas, Menlo, monospace;
      font-size: 12px;
      color: var(--blue);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }
    .sc-addr:hover { text-decoration: underline; }

    .sc-pnl {
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      margin-left: auto;
    }

    .sc-body {
      padding: 14px;
    }

    /* ── Mobile ───────────────────────────────────────────────── */

    @media (max-width: 700px) {
      #app { padding: 16px 10px 32px; }
      .col-vol, .col-skill { display: none; }
      .edge { max-width: 120px; }
      .detail-metrics { grid-template-columns: repeat(2, 1fr); }
      .da-cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="header-top">
        <h1>Wallet Scanner</h1>
        <div class="header-user" id="user-info"></div>
      </div>
      <div class="header-meta" id="meta"></div>
      <div id="watchlist-summary"></div>
    </header>
    <main id="main">
      <div class="state-msg">Loading…</div>
    </main>
  </div>

  <div id="toast"></div>

  <script>
    // ── Flag config ───────────────────────────────────────────────────────────

    const FLAG_SEV = {
      single_event_luck:    'r',
      survivorship:         'r',
      market_concentration: 'y',
      recency_cliff:        'y',
      data_artefact:        'k',
    };

    const FLAG_LABEL = {
      single_event_luck:    'single event',
      survivorship:         'survivorship',
      market_concentration: 'concentration',
      recency_cliff:        'recency cliff',
      data_artefact:        'data artefact',
    };

    // ── State ─────────────────────────────────────────────────────────────────

    let wallets = [];
    let sortKey = 'rank';
    let sortDir = 'asc';
    let openAddr = null;
    let viewFilter = 'all'; // 'all' | 'watchlist' | 'new_activity' | 'strategies'
    let watchlistSummary = null;
    let currentUser = null;

    // Strategy data for expanded detail rows (cleared on each fresh open)
    const strategyData    = new Map(); // addr -> analysis object | null (404)
    const strategyLoading = new Set(); // addrs currently fetching
    const strategyError   = new Map(); // addr -> error string

    // Regen state per address
    const regenState = new Map(); // addr -> {loading, jobId, pollTimerId, error, rateLimited}

    // History per address
    const historyData    = new Map(); // addr -> array
    const historyLoading = new Set();
    const historyError   = new Map();
    const historyExpanded = new Set();

    // Strategies tab
    const stratTabData    = new Map(); // addr -> analysis | null
    const stratTabLoading = new Set();
    const stratTabError   = new Map();
    let stratTabFetched   = false;
    let stratTypeFilter   = 'all';
    let stratReplFilter   = 'all';

    // ── Filtering ─────────────────────────────────────────────────────────────

    function setFilter(f) {
      viewFilter = f;
      if (f === 'strategies' && !stratTabFetched) {
        loadStrategiesTab();
      }
      render();
    }

    function getFiltered() {
      if (viewFilter === 'watchlist')    return wallets.filter(w => w.is_watched);
      if (viewFilter === 'new_activity') return wallets.filter(w => w.is_watched && w.new_activity_count > 0);
      if (viewFilter === 'strategies')   return wallets.filter(w => w.rank <= 10);
      return wallets;
    }

    // ── Watchlist summary ─────────────────────────────────────────────────────

    function computeLocalSummary() {
      const watched = wallets.filter(w => w.is_watched);
      const withActivity = watched.filter(w => (w.new_activity_count || 0) > 0);
      return {
        watched_count: watched.length,
        wallets_with_new_activity: withActivity.length,
        total_new_positions: withActivity.reduce((s, w) => s + (w.new_activity_count || 0), 0),
      };
    }

    // ── Watch toggle ──────────────────────────────────────────────────────────

    async function watchToggle(e, addr) {
      e.stopPropagation();
      const w = wallets.find(x => x.address === addr);
      if (!w) return;
      const watching = w.is_watched;
      try {
        if (watching) {
          await fetch('/api/watchlist/' + addr, { method: 'DELETE' });
          w.is_watched = false;
          w.new_activity_count = 0;
        } else {
          await fetch('/api/watchlist', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ wallet_address: addr }),
          });
          w.is_watched = true;
          w.new_activity_count = 0;
        }
        watchlistSummary = computeLocalSummary();
        render();
      } catch (err) {
        showToast('Watchlist update failed');
      }
    }

    // ── Formatting ────────────────────────────────────────────────────────────

    function esc(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function fmtPnl(v) {
      if (v == null) return '–';
      const abs = Math.abs(v);
      const sign = v < 0 ? '-' : '';
      return sign + '$' + (abs >= 1000 ? Math.round(abs).toLocaleString('en-US') : abs.toFixed(2));
    }

    function fmtVol(v) {
      if (v == null) return '–';
      if (v >= 1e9) return '$' + (v / 1e9).toFixed(1) + 'B';
      if (v >= 1e6) return '$' + (v / 1e6).toFixed(1) + 'M';
      if (v >= 1e3) return '$' + (v / 1e3).toFixed(1) + 'K';
      return '$' + v.toFixed(0);
    }

    function fmtUsd(v) {
      return v == null ? '–' : '$' + Math.round(Math.abs(v)).toLocaleString('en-US');
    }

    function fmtPct(v) {
      return v == null ? '–' : (v * 100).toFixed(1) + '%';
    }

    function fmtPctDirect(v) {
      return v == null ? '–' : (v * 100).toFixed(0) + '%';
    }

    function shortAddr(a) {
      return a && a.length >= 10 ? a.slice(0, 6) + '…' + a.slice(-4) : (a || '–');
    }

    function timeAgo(iso) {
      if (!iso) return '';
      const s = Math.floor((Date.now() - new Date(iso)) / 1000);
      if (s < 60)    return 'just now';
      if (s < 3600)  return Math.floor(s / 60) + ' min ago';
      if (s < 86400) return Math.floor(s / 3600) + ' hr ago';
      return Math.floor(s / 86400) + ' days ago';
    }

    function badgeClass(s) {
      if (s == null) return 'bk';
      return s >= 0.85 ? 'bg' : s >= 0.70 ? 'bb' : 'bk';
    }

    function normFlag(f) {
      return String(f).toLowerCase().replace(/[\s-]+/g, '_').split(':')[0].trim();
    }

    function pill(f, forceClass) {
      const key = normFlag(f);
      const sev = forceClass || FLAG_SEV[key] || 'k';
      const label = FLAG_LABEL[key] || f;
      return `<span class="pill p${sev}">${esc(label)}</span>`;
    }

    // ── Clipboard ─────────────────────────────────────────────────────────────

    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2000);
    }

    function copyAddr(e, addr) {
      e.stopPropagation();
      const write = () => showToast('Copied!');
      if (navigator.clipboard) {
        navigator.clipboard.writeText(addr).then(write).catch(() => fallback(addr, write));
      } else {
        fallback(addr, write);
      }
    }

    function fallback(text, cb) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      cb();
    }

    // ── Sort ──────────────────────────────────────────────────────────────────

    function sortVal(w, key) {
      const m = w.metrics || {};
      switch (key) {
        case 'rank':   return w.rank ?? Infinity;
        case 'pnl':    return m.total_pnl ?? -Infinity;
        case 'volume': return m.total_volume ?? 0;
        case 'score':  return w.composite_score ?? 0;
        case 'skill':  return w.skill_signal ?? 0;
        default:       return 0;
      }
    }

    function getSorted() {
      return [...getFiltered()].sort((a, b) => {
        const d = sortVal(a, sortKey) - sortVal(b, sortKey);
        return sortDir === 'asc' ? d : -d;
      });
    }

    function onSort(key) {
      if (sortKey === key) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      else { sortKey = key; sortDir = key === 'rank' ? 'asc' : 'desc'; }
      render();
    }

    // ── Toggle detail ─────────────────────────────────────────────────────────

    function toggle(addr) {
      const wasOpen = openAddr === addr;
      openAddr = wasOpen ? null : addr;

      if (!wasOpen) {
        const w = wallets.find(x => x.address === addr);

        // Mark watched wallet as seen
        if (w && w.is_watched && (w.new_activity_count || 0) > 0) {
          fetch('/api/watchlist/' + addr + '/seen', { method: 'POST' })
            .then(() => {
              w.new_activity_count = 0;
              watchlistSummary = computeLocalSummary();
              render();
            })
            .catch(() => {});
        }

        // Fetch strategy for top-10 wallets on every expand (always fresh)
        if (w && w.rank <= 10) {
          strategyData.delete(addr);
          strategyError.delete(addr);
          strategyLoading.add(addr);
          render();
          fetchStrategy(addr, strategyData, strategyLoading, strategyError);
          return;
        }
      } else {
        // Clear cached strategy data when closing so next open is always fresh
        strategyData.delete(addr);
        strategyError.delete(addr);
        regenState.delete(addr);
        historyExpanded.delete(addr);
      }

      render();
    }

    // ── Strategy fetching ─────────────────────────────────────────────────────

    function fetchStrategy(addr, dataMap, loadingSet, errorMap) {
      fetch('/api/wallet/' + addr + '/strategy')
        .then(res => {
          if (res.status === 404) { dataMap.set(addr, null); return; }
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json().then(d => dataMap.set(addr, d));
        })
        .catch(e => errorMap.set(addr, e.message || 'Failed to load'))
        .finally(() => { loadingSet.delete(addr); render(); });
    }

    // ── Strategies tab loading ────────────────────────────────────────────────

    function loadStrategiesTab() {
      stratTabFetched = true;
      const top10 = wallets.filter(w => w.rank <= 10);
      top10.forEach(w => {
        stratTabLoading.add(w.address);
        fetchStrategy(w.address, stratTabData, stratTabLoading, stratTabError);
      });
    }

    // ── Regenerate ────────────────────────────────────────────────────────────

    function startRegen(e, addr) {
      e.stopPropagation();
      const existing = regenState.get(addr);
      if (existing && existing.loading) return;

      regenState.set(addr, { loading: true, jobId: null, pollTimerId: null, error: null, rateLimited: false });
      render();

      fetch('/api/wallet/' + addr + '/strategy/regenerate', { method: 'POST' })
        .then(res => {
          if (res.status === 429) {
            regenState.set(addr, { loading: false, jobId: null, pollTimerId: null, error: null, rateLimited: true });
            render();
            return;
          }
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json().then(data => {
            const timerId = setInterval(() => pollRegenJob(addr), 5000);
            regenState.set(addr, { loading: true, jobId: data.job_id, pollTimerId: timerId, error: null, rateLimited: false });
            render();
          });
        })
        .catch(e => {
          regenState.set(addr, { loading: false, jobId: null, pollTimerId: null, error: e.message || 'Request failed', rateLimited: false });
          render();
        });
    }

    function pollRegenJob(addr) {
      const state = regenState.get(addr);
      if (!state || !state.jobId) return;

      fetch('/api/jobs/' + state.jobId)
        .then(res => res.json())
        .then(data => {
          if (data.status === 'complete') {
            clearInterval(state.pollTimerId);
            if (data.result) {
              strategyData.set(addr, data.result);
              stratTabData.set(addr, data.result);
            }
            regenState.set(addr, { loading: false, jobId: null, pollTimerId: null, error: null, rateLimited: false });
            render();
          } else if (data.status === 'error') {
            clearInterval(state.pollTimerId);
            regenState.set(addr, { loading: false, jobId: null, pollTimerId: null, error: data.error || 'Analysis failed', rateLimited: false });
            render();
          }
        })
        .catch(() => {});
    }

    // ── History ───────────────────────────────────────────────────────────────

    function toggleHistory(e, addr) {
      e.stopPropagation();
      if (historyExpanded.has(addr)) {
        historyExpanded.delete(addr);
        render();
        return;
      }
      historyExpanded.add(addr);
      if (!historyData.has(addr) && !historyLoading.has(addr)) {
        historyLoading.add(addr);
        fetch('/api/wallet/' + addr + '/strategy/history')
          .then(res => res.ok ? res.json() : Promise.reject('HTTP ' + res.status))
          .then(data => { historyData.set(addr, data); })
          .catch(e => { historyError.set(addr, String(e)); })
          .finally(() => { historyLoading.delete(addr); render(); });
      }
      render();
    }

    // ── Column definitions ────────────────────────────────────────────────────

    const COLS = [
      { key: 'rank',   label: 'Rank',          sort: true                  },
      { key: 'watch',  label: '',               sort: false, cls: 'col-watch' },
      { key: 'addr',   label: 'Wallet',         sort: false                },
      { key: 'pnl',    label: 'P&amp;L',        sort: true                 },
      { key: 'volume', label: 'Volume',          sort: true,  cls: 'col-vol'  },
      { key: 'score',  label: 'Score',           sort: true                 },
      { key: 'skill',  label: 'Skill',           sort: true,  cls: 'col-skill'},
      { key: 'edge',   label: 'Edge Hypothesis', sort: false                },
      { key: 'flags',  label: 'Flags',           sort: false                },
    ];

    // ── Build thead ───────────────────────────────────────────────────────────

    function buildThead() {
      return '<tr>' + COLS.map(c => {
        const classes = [
          c.cls || '',
          c.sort ? 'sort' : '',
          c.sort && sortKey === c.key ? sortDir : '',
        ].filter(Boolean).join(' ');
        const click = c.sort ? ` onclick="onSort('${c.key}')"` : '';
        return `<th class="${classes}"${click}>${c.label}</th>`;
      }).join('') + '</tr>';
    }

    // ── Deep icon SVG ─────────────────────────────────────────────────────────

    const DEEP_ICON_SVG = `<svg width="8" height="8" viewBox="0 0 8 8" aria-hidden="true" focusable="false">
      <circle cx="4" cy="3" r="2" fill="#58a6ff"/>
      <rect x="2.5" y="5" width="3" height="1" rx="0.5" fill="#58a6ff"/>
      <rect x="3.5" y="6" width="1" height="1.5" rx="0.5" fill="#58a6ff"/>
    </svg>`;

    // ── Build data row ────────────────────────────────────────────────────────

    function buildRow(w) {
      const m   = w.metrics || {};
      const pnl = m.total_pnl;
      const pc  = pnl == null ? 'neu' : pnl > 0 ? 'pos' : 'neg';
      const s   = w.composite_score;
      const sk  = w.skill_signal;
      const flags = w.red_flags || [];
      const edge  = w.edge_hypothesis || '';
      const edgeTrunc = edge.length > 80 ? edge.slice(0, 80) + '…' : edge;

      const skillHTML = sk != null
        ? `<div class="skill-wrap">
             <div class="skill-track">
               <div class="skill-fill" style="width:${Math.round(sk * 100)}%"></div>
             </div>
             <span class="skill-num">${sk.toFixed(2)}</span>
           </div>`
        : '<span class="neu">–</span>';

      const actCount = w.new_activity_count || 0;
      const actTip = actCount === 1
        ? '1 new position since you last viewed'
        : `${actCount} new positions since you last viewed`;
      const actDot = actCount > 0
        ? `<span class="activity-dot" title="${actTip}"></span>`
        : '';

      const starClass = w.is_watched ? 'star-btn watching' : 'star-btn';
      const starIcon  = w.is_watched ? '★' : '☆';
      const starTip   = w.is_watched ? 'Remove from watchlist' : 'Add to watchlist';
      const watchCell = `<td class="col-watch">
        <div class="watch-cell">
          <button class="${starClass}" title="${starTip}" onclick="watchToggle(event,'${w.address}')">${starIcon}</button>${actDot}
        </div>
      </td>`;

      const deepIcon = w.rank <= 10
        ? `<span class="deep-icon" title="Deep strategy analysis available — tap to view" role="img" aria-label="Deep strategy analysis available">${DEEP_ICON_SVG}</span>`
        : '';

      return `<tr class="row${openAddr === w.address ? ' open' : ''}" onclick="toggle('${w.address}')">
        <td><span class="rank${w.rank <= 10 ? ' bold' : ''}">#${w.rank}${deepIcon}</span></td>
        ${watchCell}
        <td><button class="addr-btn" title="${esc(w.address)}" onclick="copyAddr(event,'${w.address}')">${shortAddr(w.address)}</button></td>
        <td><span class="${pc}">${fmtPnl(pnl)}</span></td>
        <td class="col-vol"><span class="vol">${fmtVol(m.total_volume)}</span></td>
        <td>${s != null ? `<span class="badge ${badgeClass(s)}">${s.toFixed(3)}</span>` : '<span class="neu">–</span>'}</td>
        <td class="col-skill">${skillHTML}</td>
        <td><span class="edge" title="${esc(edge)}">${esc(edgeTrunc) || '<span class="neu">–</span>'}</span></td>
        <td><div class="flags">${flags.length ? flags.map(f => pill(f)).join('') : '<span class="neu" style="font-size:12px">–</span>'}</div></td>
      </tr>`;
    }

    // ── Build deep analysis content ───────────────────────────────────────────

    function buildDeepSkeleton() {
      return `<div class="da-skeleton" role="status" aria-label="Loading strategy analysis">
        <div class="da-header">
          <div class="da-skel-block" style="width:130px;height:14px"></div>
          <div class="da-skel-block" style="width:90px;height:11px;margin-left:8px"></div>
        </div>
        <div class="da-cards">
          <div class="da-skel-block" style="height:60px"></div>
          <div class="da-skel-block" style="height:60px"></div>
          <div class="da-skel-block" style="height:60px"></div>
        </div>
        <div class="da-skel-block" style="height:80px;margin-bottom:10px"></div>
        <div class="da-skel-block" style="height:50px"></div>
      </div>`;
    }

    function buildRegenControls(addr, regen) {
      if (!currentUser) return '';
      if (regen && regen.rateLimited) {
        return `<span class="da-rate-limit" role="alert" aria-live="polite">
          You've hit the daily regeneration limit (5 per day). Resets at midnight UTC.
        </span>`;
      }
      if (regen && regen.loading) {
        return `<span class="da-inline-msg" role="status" aria-live="polite">Analyzing… this may take 30–60 seconds</span>`;
      }
      if (regen && regen.error) {
        return `<span class="da-rate-limit" role="alert">${esc(regen.error)}</span>`;
      }
      return `<button class="da-regen-btn" onclick="startRegen(event,'${addr}')"
        aria-label="Regenerate strategy analysis for wallet ${addr}">Regenerate</button>`;
    }

    function buildDeepAnalysisEmpty(addr, regen) {
      const isLoading = regen && regen.loading;
      return `<div class="da-header">
        <h2 class="da-title">Strategy Analysis</h2>
        ${buildRegenControls(addr, regen)}
      </div>
      <p class="da-empty">Strategy analysis hasn't been generated yet for this wallet.</p>
      ${!isLoading && currentUser ? `<button class="da-generate-btn" onclick="startRegen(event,'${addr}')"
        aria-label="Generate strategy analysis for wallet ${addr}">Generate Now</button>` : ''}`;
    }

    function buildDeepAnalysisFull(addr, d, regen) {
      // At-a-glance cards
      const replicableClass = d.is_replicable ? 'da-replicable-yes' : 'da-replicable-no';
      const replicableText  = d.is_replicable ? 'YES' : 'NO';
      const confText = d.replicability_confidence != null
        ? `<span class="da-conf">${fmtPctDirect(d.replicability_confidence)}</span>` : '';

      const cards = `<div class="da-cards" aria-label="Strategy at a glance">
        <div class="da-card">
          <div class="da-card-label">Replicable?</div>
          <div class="da-card-value ${replicableClass}">${replicableText}${confText}</div>
        </div>
        <div class="da-card">
          <div class="da-card-label">Strategy Type</div>
          <div class="da-card-value" style="font-size:14px;padding-top:3px">
            <span class="da-strategy-badge">${esc(d.strategy_type || '–')}</span>
            ${d.strategy_subtype ? `<span class="da-conf">${esc(d.strategy_subtype)}</span>` : ''}
          </div>
        </div>
        <div class="da-card">
          <div class="da-card-label">Min Capital</div>
          <div class="da-card-value" style="font-size:16px">${d.capital_required_min_usd != null ? fmtUsd(d.capital_required_min_usd) : '–'}</div>
        </div>
      </div>`;

      // Replication blueprint
      const blueprint = `<div class="da-subsection">
        <div class="da-subsection-title">Replication Blueprint</div>
        <dl class="da-blueprint">
          <dt>Entry Signal</dt>
          <dd>${esc(d.entry_signal || '–')}</dd>
          <dt>Exit Signal</dt>
          <dd>${esc(d.exit_signal || '–')}</dd>
          <dt>Position Sizing</dt>
          <dd>${esc(d.position_sizing_rule || '–')}</dd>
          <dt>Market Selection</dt>
          <dd>${esc(d.market_selection_criteria || '–')}</dd>
          <dt>Infrastructure</dt>
          <dd>${esc(d.infrastructure_required || '–')}</dd>
        </dl>
      </div>`;

      // Performance estimates (only if any non-null)
      let perf = '';
      const hasPerf = d.estimated_hit_rate != null || d.estimated_avg_hold_time_hours != null || d.estimated_sharpe_proxy != null;
      if (hasPerf) {
        const items = [];
        if (d.estimated_hit_rate != null)
          items.push(`<div class="da-perf-item"><div class="da-perf-label">Hit Rate</div><div class="da-perf-value">${fmtPctDirect(d.estimated_hit_rate)}</div></div>`);
        if (d.estimated_avg_hold_time_hours != null)
          items.push(`<div class="da-perf-item"><div class="da-perf-label">Avg Hold Time</div><div class="da-perf-value">${d.estimated_avg_hold_time_hours.toFixed(1)} hr</div></div>`);
        if (d.estimated_sharpe_proxy != null)
          items.push(`<div class="da-perf-item"><div class="da-perf-label">Sharpe Proxy</div><div class="da-perf-value">${d.estimated_sharpe_proxy.toFixed(2)}</div></div>`);
        perf = `<div class="da-subsection">
          <div class="da-subsection-title">Performance Estimates</div>
          <div class="da-perf">${items.join('')}</div>
        </div>`;
      }

      // Risks (collapsible)
      const failures  = Array.isArray(d.failure_modes)  ? d.failure_modes  : [];
      const riskItems = Array.isArray(d.risk_factors)   ? d.risk_factors   : [];
      let risks = '';
      if (failures.length || riskItems.length) {
        const failuresHtml = failures.length
          ? `<h3>Failure Modes</h3><ul>${failures.map(f => `<li>${esc(f)}</li>`).join('')}</ul>` : '';
        const riskHtml = riskItems.length
          ? `<h3>Risk Factors</h3><ul>${riskItems.map(r => `<li>${esc(r)}</li>`).join('')}</ul>` : '';
        risks = `<details class="da-risks">
          <summary>Risks</summary>
          <div class="da-risks-body">${failuresHtml}${riskHtml}</div>
        </details>`;
      }

      // Full thesis + callout
      let thesis = '';
      if (d.full_thesis) {
        const paragraphs = d.full_thesis.split(/\n\n+/).map(p => `<p>${esc(p.trim())}</p>`).join('');
        thesis = `<div class="da-subsection">
          <div class="da-subsection-title">Full Thesis</div>
          <div class="da-thesis">${paragraphs}</div>
        </div>`;
      }

      let callout = '';
      if (d.paper_trade_recommendation) {
        callout = `<div class="da-callout" role="note">
          <div class="da-callout-label">Paper Trade Recommendation</div>
          <div class="da-callout-body">${esc(d.paper_trade_recommendation)}</div>
        </div>`;
      }

      // History link
      const histExpanded = historyExpanded.has(addr);
      const histHtml = buildHistorySection(addr);
      const histLink = `<button class="da-history-link" onclick="toggleHistory(event,'${addr}')">
        ${histExpanded ? 'Hide analysis history' : 'View analysis history'}
      </button>`;

      return `<div class="da-header">
        <h2 class="da-title">Strategy Analysis</h2>
        <span class="da-timestamp">Last analyzed: ${timeAgo(d.generated_at)}</span>
        ${buildRegenControls(addr, regen)}
      </div>
      ${cards}
      ${blueprint}
      ${perf}
      ${risks}
      ${thesis}
      ${callout}
      ${histLink}
      ${histHtml}`;
    }

    function buildHistorySection(addr) {
      if (!historyExpanded.has(addr)) return '';
      if (historyLoading.has(addr)) {
        return `<div class="da-history-list"><div class="da-history-item" role="status">Loading history…</div></div>`;
      }
      if (historyError.has(addr)) {
        return `<div class="da-history-list"><div class="da-history-item" style="color:var(--red)">Failed to load history.</div></div>`;
      }
      const items = historyData.get(addr);
      if (!items || items.length === 0) {
        return `<div class="da-history-list"><div class="da-history-item">No previous analyses found.</div></div>`;
      }
      const rows = items.map(h => {
        const type = h.strategy_type || '–';
        const rep = h.is_replicable ? 'Replicable' : 'Not replicable';
        return `<div class="da-history-item">
          <strong>${timeAgo(h.generated_at)}</strong> &mdash;
          ${esc(type)} &middot; ${rep}
          ${h.replicability_confidence != null ? ` (${fmtPctDirect(h.replicability_confidence)} confidence)` : ''}
        </div>`;
      }).join('');
      return `<div class="da-history-list" aria-label="Previous analyses">${rows}</div>`;
    }

    function buildDeepSection(w) {
      const addr = w.address;

      if (w.rank > 10) {
        return `<div class="da-section">
          <p class="da-placeholder-msg" role="note">Deep strategy analysis available for top-10 wallets only. This wallet ranks #${w.rank}.</p>
        </div>`;
      }

      const loading = strategyLoading.has(addr);
      const error   = strategyError.get(addr);
      const data    = strategyData.get(addr);
      const regen   = regenState.get(addr);

      let inner;
      if (loading) {
        inner = buildDeepSkeleton();
      } else if (error) {
        inner = `<div class="da-header"><h2 class="da-title">Strategy Analysis</h2></div>
          <p class="da-error-msg" role="alert">Failed to load strategy analysis.</p>`;
      } else if (data === undefined) {
        inner = buildDeepSkeleton();
      } else if (data === null) {
        inner = buildDeepAnalysisEmpty(addr, regen);
      } else {
        inner = buildDeepAnalysisFull(addr, data, regen);
      }

      return `<section class="da-section" aria-label="Deep strategy analysis">${inner}</section>`;
    }

    // ── Build detail row ──────────────────────────────────────────────────────

    function buildDetail(w) {
      const m  = w.metrics || {};
      const hf = w.heuristic_red_flags || [];
      const cf = w.claude_red_flags || [];

      const dm = (label, val) =>
        `<div><div class="dm-label">${label}</div><div class="dm-value">${val}</div></div>`;

      const edgeSec = w.edge_hypothesis
        ? `<div class="detail-sec">
             <div class="detail-sec-label">Edge Hypothesis</div>
             <div class="detail-sec-body">${esc(w.edge_hypothesis)}</div>
           </div>` : '';

      const notesSec = w.claude_notes
        ? `<div class="detail-sec">
             <div class="detail-sec-label">Claude Notes</div>
             <div class="detail-sec-body">${esc(w.claude_notes)}</div>
           </div>` : '';

      const flagsSec = (hf.length || cf.length)
        ? `<div class="detail-sec">
             <div class="detail-sec-label">Red Flags</div>
             <div class="detail-flags">
               ${hf.map(f => pill(f, 'k')).join('')}
               ${cf.map(f => pill(f)).join('')}
             </div>
           </div>` : '';

      const watchLabel = w.is_watched ? '★ Watching' : '☆ Watch';

      return `<tr class="detail-row">
        <td colspan="9" class="detail-cell">
          <div class="detail-inner">
            <div class="detail-metrics">
              ${dm('Trade Count',        m.trade_count ?? '–')}
              ${dm('Total P&amp;L',      fmtPnl(m.total_pnl))}
              ${dm('Total Volume',       fmtUsd(m.total_volume))}
              ${dm('Market Count',       m.market_count ?? '–')}
              ${dm('Realized Pos.',      m.realized_position_count ?? '–')}
              ${dm('Unresolved Pos.',    m.unresolved_position_count ?? '–')}
              ${dm('P&amp;L from Top 3', fmtPct(m.pct_pnl_from_top_3_positions))}
              ${dm('Portfolio Value',    m.portfolio_value != null ? fmtUsd(m.portfolio_value) : '–')}
            </div>
            ${edgeSec}
            ${notesSec}
            ${flagsSec}
            ${buildDeepSection(w)}
            <div class="detail-actions">
              <a class="action-link" href="https://polymarket.com/profile/${w.address}" target="_blank" rel="noopener noreferrer">View on Polymarket ↗</a>
              <button class="action-link" onclick="copyAddr(event,'${w.address}')">Copy full address</button>
              <button class="star-btn${w.is_watched ? ' watching' : ''}" style="font-size:13px" onclick="watchToggle(event,'${w.address}')">
                ${watchLabel}
              </button>
            </div>
          </div>
        </td>
      </tr>`;
    }

    // ── Build filter tabs ─────────────────────────────────────────────────────

    function buildFilterTabs() {
      const tabs = [
        { key: 'all',          label: 'All Wallets'  },
        { key: 'watchlist',    label: 'Watchlist'    },
        { key: 'new_activity', label: 'New Activity' },
        { key: 'strategies',   label: 'Strategies'   },
      ];
      return '<div class="filter-tabs" role="tablist">' +
        tabs.map(t =>
          `<button role="tab" aria-selected="${viewFilter === t.key}" class="tab-btn${viewFilter === t.key ? ' active' : ''}" onclick="setFilter('${t.key}')">${t.label}</button>`
        ).join('') +
        '</div>';
    }

    // ── Build watchlist summary bar ───────────────────────────────────────────

    function buildWatchlistSummary() {
      if (!watchlistSummary || watchlistSummary.watched_count === 0) return '';
      const { watched_count: wc, wallets_with_new_activity: wna, total_new_positions: tnp } = watchlistSummary;
      const wLabel = wc === 1 ? '1 wallet' : `${wc} wallets`;
      if (wna === 0) {
        return `👁 Watching ${wLabel} · all caught up`;
      }
      const pLabel = tnp === 1 ? '1 new position' : `${tnp} new positions`;
      const wnaLabel = wna === 1 ? '1 with new activity' : `${wna} with new activity`;
      return `👁 Watching ${wLabel} · <a href="#" onclick="setFilter('new_activity');return false;">${wnaLabel} (${pLabel})</a>`;
    }

    // ── Strategies tab view ───────────────────────────────────────────────────

    function getStrategyTypes() {
      const types = new Set();
      stratTabData.forEach(d => { if (d && d.strategy_type) types.add(d.strategy_type); });
      return ['all', ...Array.from(types).sort()];
    }

    function setStratTypeFilter(e, val) {
      e.stopPropagation();
      stratTypeFilter = val;
      render();
    }

    function setStratReplFilter(e, val) {
      e.stopPropagation();
      stratReplFilter = val;
      render();
    }

    function buildStrategiesView() {
      const types = getStrategyTypes();

      const typePills = types.map(t =>
        `<button class="strat-pill${stratTypeFilter === t ? ' active' : ''}" onclick="setStratTypeFilter(event,'${esc(t)}')">${t === 'all' ? 'All Types' : esc(t)}</button>`
      ).join('');

      const replPills = ['all', 'replicable', 'not_replicable'].map(r => {
        const label = r === 'all' ? 'All' : r === 'replicable' ? 'Replicable' : 'Not Replicable';
        return `<button class="strat-pill${stratReplFilter === r ? ' active' : ''}" onclick="setStratReplFilter(event,'${r}')">${label}</button>`;
      }).join('');

      const filters = `<div class="strat-filters" aria-label="Strategy filters">
        <div class="strat-filter-group">
          <span class="strat-filter-label">Type:</span>
          ${typePills}
        </div>
        <div class="strat-filter-group">
          <span class="strat-filter-label">Replicable:</span>
          ${replPills}
        </div>
      </div>`;

      const top10 = wallets.filter(w => w.rank <= 10).sort((a, b) => a.rank - b.rank);

      const filtered = top10.filter(w => {
        const d = stratTabData.get(w.address);
        if (stratTypeFilter !== 'all' && d && d.strategy_type !== stratTypeFilter) return false;
        if (stratReplFilter === 'replicable'     && d && !d.is_replicable) return false;
        if (stratReplFilter === 'not_replicable' && d &&  d.is_replicable) return false;
        return true;
      });

      if (filtered.length === 0) {
        const allLoading = top10.every(w => stratTabLoading.has(w.address));
        if (allLoading) {
          const skeletons = top10.map(() =>
            `<div class="strategy-card"><div class="sc-body">${buildDeepSkeleton()}</div></div>`
          ).join('');
          return filters + `<div class="strategies-list">${skeletons}</div>`;
        }
        return filters + '<div class="state-msg">No wallets match the selected filters.</div>';
      }

      const cards = filtered.map(w => {
        const addr    = w.address;
        const loading = stratTabLoading.has(addr);
        const error   = stratTabError.get(addr);
        const data    = stratTabData.get(addr);
        const regen   = regenState.get(addr);
        const m       = w.metrics || {};
        const pnl     = m.total_pnl;
        const pc      = pnl == null ? 'neu' : pnl > 0 ? 'pos' : 'neg';

        let analysisHtml;
        if (loading) {
          analysisHtml = buildDeepSkeleton();
        } else if (error) {
          analysisHtml = `<p class="da-error-msg" role="alert">Failed to load strategy analysis.</p>`;
        } else if (data === undefined || data === null) {
          analysisHtml = buildDeepAnalysisEmpty(addr, regen);
        } else {
          analysisHtml = buildDeepAnalysisFull(addr, data, regen);
        }

        return `<article class="strategy-card" aria-label="Wallet ${shortAddr(addr)} strategy">
          <div class="sc-header">
            <span class="sc-rank">#${w.rank}</span>
            <button class="sc-addr" title="${esc(addr)}" onclick="copyAddr(event,'${addr}')">${shortAddr(addr)}</button>
            <span class="sc-pnl ${pc}">${fmtPnl(pnl)}</span>
          </div>
          <div class="sc-body">
            <section aria-label="Deep strategy analysis">${analysisHtml}</section>
          </div>
        </article>`;
      }).join('');

      return filters + `<div class="strategies-list" role="list">${cards}</div>`;
    }

    // ── Render ────────────────────────────────────────────────────────────────

    function render() {
      document.getElementById('watchlist-summary').innerHTML = buildWatchlistSummary();

      let tableContent;

      if (viewFilter === 'strategies') {
        tableContent = buildStrategiesView();
        document.getElementById('main').innerHTML = buildFilterTabs() + tableContent;
        return;
      }

      const sorted = getSorted();

      if (!sorted.length) {
        let msg;
        if (viewFilter === 'watchlist') {
          msg = "You haven&#39;t watched any wallets yet. Star a wallet to add it here.";
        } else if (viewFilter === 'new_activity') {
          msg = "No new activity on your watched wallets.";
        } else {
          msg = "No data yet — first scan in progress. Check back in an hour.";
        }
        tableContent = `<div class="state-msg">${msg}</div>`;
      } else {
        const rows = sorted.map(w =>
          buildRow(w) + (openAddr === w.address ? buildDetail(w) : '')
        ).join('');
        tableContent =
          `<div class="table-wrap" role="region" aria-label="Wallet leaderboard">
             <table>
               <thead>${buildThead()}</thead>
               <tbody>${rows}</tbody>
             </table>
           </div>`;
      }

      document.getElementById('main').innerHTML = buildFilterTabs() + tableContent;
    }

    // ── Init ──────────────────────────────────────────────────────────────────

    async function init() {
      // Load user info for the header and auth state (non-blocking)
      fetch('/api/auth/me').then(r => {
        if (r.ok) return r.json();
      }).then(me => {
        if (!me) return;
        currentUser = me;
        const email = me.email || me.name || 'you';
        document.getElementById('user-info').innerHTML =
          `<span>Signed in as ${esc(email)}</span>` +
          `<a href="/api/auth/signout">Sign out</a>`;
      }).catch(() => {});

      try {
        const res = await fetch('/api/leaderboard?limit=50');
        if (res.status === 401) {
          window.location.href = '/login';
          return;
        }
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        // Handle both array (legacy) and object (current) response shape
        wallets = Array.isArray(data) ? data : (data.wallets || []);
        const meta = Array.isArray(data) ? null : (data.meta || null);

        // Render header meta
        const metaEl = document.getElementById('meta');
        const parts = [];
        if (meta && meta.last_ranked_at) parts.push('Updated ' + timeAgo(meta.last_ranked_at));
        if (meta && meta.total)          parts.push(`Showing top ${wallets.length} of ${meta.total} ranked wallets`);
        metaEl.innerHTML = parts.map(p => `<span>${esc(p)}</span>`).join('');

        if (!wallets.length) {
          document.getElementById('main').innerHTML =
            buildFilterTabs() + '<div class="state-msg">No data yet — first scan in progress. Check back in an hour.</div>';
          return;
        }

        watchlistSummary = computeLocalSummary();
        render();
      } catch (err) {
        document.getElementById('main').innerHTML =
          '<div class="state-msg">Failed to load leaderboard. Please refresh the page.</div>';
        console.error(err);
      }
    }

    init();
  </script>
</body>
</html>
